<head>

<style>

*{

*{

    -webkit-touch-callout: none;
    outline: none;
}

*:focus,
*:active{
    outline:none !important;
}

button,
div,
img,
a{
    -webkit-tap-highlight-color: transparent !important;

html,
body{
    margin:0;
    width:100%;

.page{

width:100%;
height:100%;

#page2{

img{

height:100%;

.bg{

top:0;

height:100%;

.menu{

left:26%;

audio{

}

#galleryContainer{

width:100%;
height:100%;

}
#galleryContainer::-webkit-scrollbar{

}

.galleryImg{
min-width:100%;
height:100%;

</head>

<body>

 <div id="galleryPopup"

<script>
const page1=document.getElementById("page1");
const page2=document.getElementById("page2");
const cover=document.getElementById("cover");
const music=document.getElementById("music");

cover.onclick = function () {
    page1.style.display = "none";
    page2.style.display = "block";

    music.currentTime = 0;
    music.play().catch(function(err){
        console.log(err);
    });
};
document.getElementById("address").onclick=function(){

   if(confirm(
"PS55,\n"+
"Kg. Banggol Tebakang,\n"+
"16450 Ketereh,\n"+
"Kota Bharu,\n"+
"Kelantan.\n\n"+
"Buka lokasi di Google Maps?"
)){ 
    music.pause();
music.currentTime = 0;
        window.open("https://www.google.com/maps?q=5.9556561,102.2503899","_blank");

    }

};

document.getElementById("whatsapp").onclick=function(){
music.pause();
music.currentTime = 0;
    location.href="https://wa.me/60146009006";
};

document.getElementById("call").onclick=function(){
    if(confirm("Hubungi Rokiah Hasan")){
     music.pause();
music.currentTime = 0;
        location.href="tel:0109224453";
    }
};

document.getElementById("bank").onclick=function(){
    document.getElementById("bankPopup").style.display="block";
};

document.getElementById("email").onclick=function(){
    music.pause();
    music.currentTime = 0;
    location.href = "mailto:eyjoe2.aa@gmail.com";
};

document.getElementById("tiktok").onclick=function(){
    music.pause();
    music.currentTime = 0;

    navigator.clipboard.writeText("https://www.tiktok.com/@ijo.teghe9006?_r=1&_t=ZS-987iKlhlCMq");

    window.open("https://www.tiktok.com/@ijo.teghe9006?_r=1&_t=ZS-987iKlhlCMq","_blank");
};
document.getElementById("gallery").onclick=function(){
    document.getElementById("galleryPopup").style.display="block";
};

function closeGallery(){
    document.getElementById("galleryPopup").style.display="none";
}
document.getElementById("galleryHome").onclick = function () {
    document.getElementById("galleryPopup").style.display = "none";
    page2.style.display = "block";
};

const galleryImages = document.querySelectorAll(".galleryImg");

let startX = 0;

galleryImages.forEach(img=>{

    let startDistance = 0;
    let currentScale = 1;

    img.addEventListener("touchstart",function(e){

        if(e.touches.length==1 && currentScale==1){
            startX = e.touches[0].clientX;
        }

        if(e.touches.length==2){

            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;

            startDistance = Math.hypot(dx,dy);

        }

    });

    img.addEventListener("touchmove",function(e){

        if(e.touches.length==2){

            e.preventDefault();

            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;

            let distance = Math.hypot(dx,dy);

            currentScale = distance / startDistance;

            if(currentScale<1) currentScale=1;
            if(currentScale>4) currentScale=4;

            img.style.transform="scale("+currentScale+")";
const homeBtn = document.getElementById("galleryHome");

if(currentScale > 1){
    homeBtn.style.display = "none";
}else{
    homeBtn.style.display = "block";
}
        }

    });

    img.addEventListener("touchend",function(e){

        if(currentScale<=1){
            currentScale=1;
            img.style.transform="scale(1)";
        }
       
        if(currentScale>1) return;

        if(e.changedTouches.length==1){

            let endX = e.changedTouches[0].clientX;

            if(startX-endX>50){
                img.nextElementSibling?.scrollIntoView({
                    behavior:"smooth",
                    inline:"center"
                });
            }

            if(endX-startX>50){
                img.previousElementSibling?.scrollIntoView({
                    behavior:"smooth",
                    inline:"center"
                });
            }

        }

    });

});
document.getElementById("home").onclick=function(){
    page2.style.display="none";
    page1.style.display="block";
    music.pause();
    music.currentTime=0;
};
function closeBank(){
    document.getElementById("bankPopup").style.display="none";
}

function copyBank(){
    navigator.clipboard.writeText("10302000151261");
    alert("No Akaun Disalin");
}

function shareBank(){
    window.open("https://wa.me/?text=RHB%20Bank%20Account%0A%0ANama%3A%20Afizul%20Ahmad%0ANo.%20Akaun%3A%2010302000151261","_blank");
}    

</script>
